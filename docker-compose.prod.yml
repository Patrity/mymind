# Production compose for MyMind (homelab / Proxmox + Docker).
#   docker compose -f docker-compose.prod.yml up -d --build
# Put a TLS reverse proxy (Caddy/Traefik/nginx) in front of the app and set
# BETTER_AUTH_URL to the public https origin. See docs/DEPLOYMENT.md.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: mymind-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mymind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: mymind
    volumes:
      - mymind-pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d   # creates pgcrypto/pg_trgm/ltree/vector on first boot
    # No host port published — only the app (same compose network) reaches it.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mymind -d mymind"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Inlined into the client bundle at build time (see Dockerfile). Compose
        # interpolates this from .env. Also kept in the runtime env via env_file.
        NUXT_PUBLIC_UNMUTE_URL: ${NUXT_PUBLIC_UNMUTE_URL:-}
    container_name: mymind-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env                # AI_*, BETTER_AUTH_SECRET, ALLOW_SIGNUP, etc.
    environment:
      # Override DB + storage for the container network (db reachable as host "db" on 5432).
      DATABASE_URL: postgres://mymind:${POSTGRES_PASSWORD}@db:5432/mymind
      STORAGE_LOCAL_DIR: /app/.data/uploads
      NITRO_PORT: "3000"
      NITRO_HOST: "0.0.0.0"
      # Nitro reads runtimeConfig overrides ONLY from NUXT_/NITRO_-prefixed env at
      # runtime — plain AI_* names from env_file do NOT apply, and the baked build
      # values are empty (.dockerignore excludes .env from the image build). Map the
      # plain names (the single source of truth in .env) onto the prefixed keys.
      NUXT_AI_REASONING_BASE_URL: ${AI_REASONING_BASE_URL:-}
      NUXT_AI_REASONING_API_KEY: ${AI_REASONING_API_KEY:-}
      NUXT_AI_REASONING_MODEL: ${AI_REASONING_MODEL:-}
      NUXT_AI_BULK_BASE_URL: ${AI_BULK_BASE_URL:-}
      NUXT_AI_BULK_API_KEY: ${AI_BULK_API_KEY:-}
      NUXT_AI_BULK_MODEL: ${AI_BULK_MODEL:-}
      NUXT_AI_EMBEDDINGS_BASE_URL: ${AI_EMBEDDINGS_BASE_URL:-}
      NUXT_AI_EMBEDDINGS_API_KEY: ${AI_EMBEDDINGS_API_KEY:-}
      NUXT_AI_EMBEDDINGS_MODEL: ${AI_EMBEDDINGS_MODEL:-}
      NUXT_AI_VISION_BASE_URL: ${AI_VISION_BASE_URL:-}
      NUXT_AI_VISION_API_KEY: ${AI_VISION_API_KEY:-}
      NUXT_AI_VISION_MODEL: ${AI_VISION_MODEL:-}
      NUXT_AI_STT_BASE_URL: ${AI_STT_BASE_URL:-}
      NUXT_AI_STT_API_KEY: ${AI_STT_API_KEY:-}
      NUXT_AI_STT_MODEL: ${AI_STT_MODEL:-}
      NUXT_AI_TTS_KOKORO_BASE_URL: ${AI_TTS_KOKORO_BASE_URL:-}
      NUXT_AI_TTS_KOKORO_API_KEY: ${AI_TTS_KOKORO_API_KEY:-}
      NUXT_AI_TTS_KOKORO_MODEL: ${AI_TTS_KOKORO_MODEL:-}
      NUXT_AI_TTS_KOKORO_VOICE: ${AI_TTS_KOKORO_VOICE:-}
      NUXT_AI_TTS_CHATTERBOX_BASE_URL: ${AI_TTS_CHATTERBOX_BASE_URL:-}
      NUXT_AI_TTS_CHATTERBOX_API_KEY: ${AI_TTS_CHATTERBOX_API_KEY:-}
      NUXT_AI_TTS_CHATTERBOX_MODEL: ${AI_TTS_CHATTERBOX_MODEL:-}
      NUXT_AI_TTS_CHATTERBOX_VOICE: ${AI_TTS_CHATTERBOX_VOICE:-}
      NUXT_AI_RERANK_BASE_URL: ${AI_RERANK_BASE_URL:-}
      NUXT_AI_RERANK_API_KEY: ${AI_RERANK_API_KEY:-}
    volumes:
      - mymind-uploads:/app/.data/uploads   # persistent uploaded blobs
    ports:
      - "3000:3000"   # bind to 127.0.0.1:3000 and front with a TLS proxy in real deployments

volumes:
  mymind-pgdata:
  mymind-uploads:
