# Production compose for MyMind — db + searxng only.
# The APP now runs NATIVELY via systemd (deploy/mymind.service), not as a container.
#   docker compose -f docker-compose.prod.yml up -d --remove-orphans db searxng
# See docs/DEPLOYMENT.md (Native deploy).
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: mymind-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mymind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: mymind
    volumes:
      - mymind-pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d   # creates pgcrypto/pg_trgm/ltree/vector on first boot
    ports:
      - "127.0.0.1:5432:5432"   # native app reaches Postgres on loopback (LXC-internal only)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mymind -d mymind"]
      interval: 10s
      timeout: 5s
      retries: 10

  searxng:
    image: searxng/searxng:latest
    container_name: mymind-searxng
    restart: unless-stopped
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:?set SEARXNG_SECRET in .env}
    volumes:
      - ./searxng:/etc/searxng:rw
    # LAN-published so other homelab services can share it; the native app reaches it at
    # http://127.0.0.1:8088. Keep LAN-only — do NOT expose to the internet.
    ports:
      - "${SEARXNG_PORT:-8088}:8080"

volumes:
  mymind-pgdata:
