name: deploy

on:
  push:
    # Docs-only commits don't change runtime behaviour — skip the whole
    # pipeline (and the deploy) for them.
    paths-ignore:
      - 'docs/**'
      - '**.md'

# A newer push to master supersedes an in-flight deploy.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/master' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint is red repo-wide (215 errors as of 2026-06-09): annotate, do not block.
      - name: Lint
        continue-on-error: true
        run: pnpm run lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NUXT_PUBLIC_UNMUTE_URL: ""

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: [self-hosted, proxmox]
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync code into LXC 114
        run: |
          # Clear the tracked tree first — preserving runtime state that lives in
          # /opt/mymind (.env, .env.native, plus any .data/.output/.nuxt/node_modules/workspace/.git)
          # — then extract the fresh checkout so deletions propagate.
          pct exec 114 -- bash -lc 'cd /opt/mymind && find . -maxdepth 1 -mindepth 1 \
            ! -name .git ! -name .env ! -name .env.native ! -name .data ! -name .output \
            ! -name .nuxt ! -name node_modules ! -name workspace -exec rm -rf {} +'
          tar -C "$GITHUB_WORKSPACE" \
            --exclude=.git --exclude=node_modules --exclude=.nuxt \
            --exclude=.output --exclude=.data --exclude=.env --exclude=.env.native \
            -cf - . | pct exec 114 -- tar -C /opt/mymind -xf -

      - name: Ensure db + searxng up (keep the OLD app serving during the build)
        run: |
          # No --remove-orphans here: the previous app (docker container on first cutover,
          # or the native service on later deploys) keeps serving while we build, so a slow
          # or FAILED build never causes an outage.
          pct exec 114 -- bash -lc 'cd /opt/mymind && docker compose -f docker-compose.prod.yml up -d db searxng'

      - name: Provision native runtime (idempotent)
        run: |
          pct exec 114 -- bash -lc 'cd /opt/mymind && bash deploy/provision-native.sh'

      - name: Install + build + migrate (migrate uses .env.native)
        run: |
          pct exec 114 -- bash -lc 'cd /opt/mymind && pnpm install --frozen-lockfile && NUXT_PUBLIC_UNMUTE_URL="" pnpm build && set -a && . ./.env.native && set +a && pnpm db:migrate'

      - name: Cut over to native (drop old app container, start native on :3000)
        run: |
          # --remove-orphans drops the now-unlisted `app` container (first cutover); on later
          # deploys it's a no-op. systemctl restart binds the freshly-built .output on :3000.
          # Downtime is just this step (seconds), not the whole build.
          pct exec 114 -- bash -lc 'cd /opt/mymind && docker compose -f docker-compose.prod.yml up -d --remove-orphans db searxng && systemctl restart mymind'

      - name: Health check (/login -> 200)
        run: |
          # shellcheck disable=SC2016
          pct exec 114 -- bash -lc 'for i in $(seq 1 30); do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" http://localhost:3000/login || true)
            if [ "$code" = "200" ]; then echo "healthy"; exit 0; fi
            echo "waiting ($i): got $code"; sleep 5
          done; echo "never became healthy"; exit 1'
